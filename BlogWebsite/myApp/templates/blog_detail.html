{% extends 'base.html' %}

{% block title %}{{ object.title }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>{{ object.title }}</h1>
    <p class="text-muted">By {{ object.author }} on {{ object.created_at|date:'M d, Y' }}</p>
    <div class="mb-4">
        {{ object.content|linebreaks }}
    </div>
    <a href="{% url 'home' %}" class="btn btn-primary">Back to Home</a>
</div>
{% endblock %}
